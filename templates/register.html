{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass-card">
        <h2>Join AnimeFav</h2>
        <p class="subtitle">Create an account to start your journey</p>
        
        <form action="{{ url_for('register') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-icon">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" name="username" required minlength="3">
                </div>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-icon">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" name="email" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" required minlength="6">
                </div>
            </div>
            
            <button type="submit" class="btn-primary full-width">Create Account</button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}" class="highlight-link">Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
